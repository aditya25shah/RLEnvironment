spec_version: 1
version: "1.0.0"
name: customer_support_ops_env
openenv_version: "0.2.0"
description: Deterministic customer support operations environment with 3 graded tasks
type: space
runtime: fastapi
app: server.app:app
port: 8000
max_episode_steps: 4
tasks:
  - id: easy_refund_renewal
    name: Billing refund for accidental renewal
    description: A customer was charged for a renewal after canceling and needs a compliant refund workflow.
    difficulty: easy
    max_steps: 4
    grader:
      module: tasks.easy_refund_renewal.grader
      function: grade
  - id: medium_replacement_delay
    name: Replacement for VIP shipment error
    description: A Premier customer received the wrong item and needs an overnight replacement before an event.
    difficulty: medium
    max_steps: 4
    grader:
      module: tasks.medium_replacement_delay.grader
      function: grade
  - id: hard_account_takeover
    name: Account takeover with fraudulent purchases
    description: A customer reports an account takeover, exported contacts, and unauthorized purchases requiring escalation.
    difficulty: hard
    max_steps: 4
    grader:
      module: tasks.hard_account_takeover.grader
      function: grade
grader:
  module: graders
  function: grade_task
metadata:
  description: Deterministic customer support operations environment with 3 graded tasks
